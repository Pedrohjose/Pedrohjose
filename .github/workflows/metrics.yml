name: GitHub Metrics

on:
  # Atualiza todo dia às 09:00 (horário de Brasília / UTC-3 => 12:00 UTC)
  schedule:
    - cron: "0 12 * * *"
  # Permite rodar manualmente em Actions > GitHub Metrics > Run workflow
  workflow_dispatch:
  # Atualiza sempre que este workflow for alterado
  push:
    branches: [main]
    paths:
      - ".github/workflows/metrics.yml"

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1) Visão geral: header + atividade + comunidade + repositórios
      - name: Métricas gerais
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Pedrohjose
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          # Inclui contribuições de repositórios privados nos números
          repositories_affiliations: owner, collaborator, organization_member

      # 2) Linguagens mais usadas — com base em TODOS os repositórios que participo
      - name: Linguagens mais usadas
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Pedrohjose
          filename: metrics-languages.svg
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          # Considera repos próprios, em que colaboro e de organizações (públicos e privados)
          repositories_affiliations: owner, collaborator, organization_member
          plugin_languages: yes
          # Modo padrão: soma a linguagem de cada repositório inteiro que participo
          # (inclui Java, C#, JS, etc. de todos os repos — não filtra por autoria de commit)
          plugin_languages_categories: markup, programming
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 10
          plugin_languages_threshold: 0%

      # 3) Calendário ISO (heatmap) de contribuições do último ano — inclui privados
      - name: Calendário de contribuições
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Pedrohjose
          filename: metrics-calendar.svg
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
