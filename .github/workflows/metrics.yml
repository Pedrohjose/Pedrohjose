name: GitHub Metrics

on:
  # Atualiza todo dia às 09:00 (horário de Brasília / UTC-3 => 12:00 UTC)
  schedule:
    - cron: "0 12 * * *"
  # Permite rodar manualmente em Actions > GitHub Metrics > Run workflow
  workflow_dispatch:
  # Atualiza sempre que este workflow for alterado
  push:
    branches: [main]
    paths:
      - ".github/workflows/metrics.yml"

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1) Visão geral: header + atividade + comunidade + repositórios + linguagens
      - name: Métricas gerais
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Pedrohjose
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          # Inclui contribuições de repositórios privados nos números
          repositories_affiliations: owner, collaborator, organization_member
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage

      # 2) Calendário ISO (heatmap) de contribuições do último ano — inclui privados
      - name: Calendário de contribuições
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Pedrohjose
          filename: metrics-calendar.svg
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # 3) Hábitos e horários mais produtivos
      - name: Hábitos e atividade
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Pedrohjose
          filename: metrics-habits.svg
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
